<!DOCTYPE html>
<!--
  ============================================================
  AI Memory Files 学習アプリ ｜ v2
  CLAUDE.md / AGENTS.md / GEMINI.md
  - 例は小売店舗運営の業務シーンに統一
  - 配色: セージグリーン × アイボリー × テラコッタ
  使い方: このファイルをダブルクリックするとブラウザで開きます。
  カスタマイズ: 冒頭の CONFIG オブジェクトを編集してください。
  ============================================================
-->
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MEMORY FILES — AIに「店舗の常識」を教える3つのファイル</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Inter+Tight:wght@400;500;600;700&family=Zen+Kaku+Gothic+Antique:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     カラー: セージグリーン × アイボリー × テラコッタ
     ============================================================ */
  :root {
    --ink:         #3A4A2E;   /* メインのダークセージ（本文・サイドバー） */
    --ink-soft:    #4B5C3D;
    --sage:        #6B7F5A;   /* セージグリーン（中間色） */
    --sage-light:  #A4B395;   /* 明るいセージ（ハイライト） */
    --cream:       #F8F4EC;   /* アイボリー（ベース背景） */
    --cream-deep:  #EFE9DA;
    --terracotta:  #C66B47;   /* テラコッタ（差し色） */
    --terracotta-soft: #D88B6B;
    --warm-rose:   #B85C5C;   /* 不正解・警告色 */
    --white:       #FFFFFF;
    --line:        #3A4A2E22;
    --line-soft:   #3A4A2E11;
    --sidebar-w:   320px;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Zen Kaku Gothic Antique', 'Inter Tight', sans-serif;
    font-weight: 400;
    background-color: var(--cream);
    color: var(--ink);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    line-height: 1.7;
  }

  .font-display { font-family: 'Anton', sans-serif; font-weight: 400; letter-spacing: -0.01em; }
  .font-black   { font-family: 'Archivo Black', sans-serif; letter-spacing: -0.01em; }
  .font-jp      { font-family: 'Zen Kaku Gothic Antique', sans-serif; }
  .font-mono    { font-family: 'JetBrains Mono', monospace; }

  /* レイアウト */
  .layout {
    display: grid;
    grid-template-columns: 1fr;
    min-height: 100vh;
  }
  @media (min-width: 1024px) {
    .layout { grid-template-columns: var(--sidebar-w) 1fr; }
  }

  .sidebar {
    background: var(--ink);
    color: var(--cream);
    position: relative;
  }
  @media (min-width: 1024px) {
    .sidebar {
      position: sticky; top: 0;
      height: 100vh;
      overflow-y: auto;
      border-right: 2px solid var(--ink);
    }
  }
  @media (max-width: 1023px) {
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 88%; max-width: 360px;
      height: 100vh; z-index: 60;
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      overflow-y: auto;
      box-shadow: 8px 0 32px rgba(0,0,0,0.3);
    }
    .sidebar.open { transform: translateX(0); }
  }

  .sidebar-inner {
    padding: 28px 24px;
    display: flex; flex-direction: column;
    min-height: 100%;
  }
  .sidebar-brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 32px;
  }
  .sidebar-progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    opacity: 0.5;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .sidebar-progress-bar {
    height: 3px;
    background: rgba(248, 244, 236, 0.15);
    overflow: hidden;
    margin-bottom: 32px;
  }
  .sidebar-progress-fill {
    height: 100%;
    background: var(--terracotta);
    transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .chapter-nav { list-style: none; padding: 0; margin: 0; flex: 1; }
  .chapter-item {
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 14px;
    align-items: start;
    padding: 14px 12px;
    margin: 0 -12px;
    cursor: pointer;
    transition: background 0.2s ease;
    border: none; background: transparent;
    color: var(--cream);
    text-align: left;
    width: calc(100% + 24px);
  }
  .chapter-item:hover { background: rgba(248, 244, 236, 0.05); }
  .chapter-item.active { background: rgba(198, 107, 71, 0.15); }
  .chapter-item.active .chapter-num-sm { color: var(--terracotta-soft); }
  .chapter-item.completed .chapter-num-sm::after {
    content: '✓';
    color: var(--sage-light);
    margin-left: 6px;
    font-size: 12px;
  }
  .chapter-num-sm {
    font-family: 'Anton', sans-serif;
    font-size: 24px;
    line-height: 1;
    color: var(--cream);
    opacity: 0.5;
  }
  .chapter-item.active .chapter-num-sm,
  .chapter-item.completed .chapter-num-sm { opacity: 1; }
  .chapter-meta { display: flex; flex-direction: column; gap: 4px; }
  .chapter-tag-en {
    font-family: 'Archivo Black', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.6;
  }
  .chapter-item.active .chapter-tag-en { color: var(--terracotta-soft); opacity: 1; }
  .chapter-title-jp {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 500;
    font-size: 14px;
    line-height: 1.5;
  }

  .sidebar-footer {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid rgba(248, 244, 236, 0.1);
  }
  .sidebar-reset {
    font-family: 'Archivo Black', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: transparent; border: none;
    color: var(--cream);
    opacity: 0.5; cursor: pointer; padding: 0;
    transition: opacity 0.2s ease;
  }
  .sidebar-reset:hover { opacity: 1; }

  .sidebar-overlay {
    position: fixed; inset: 0;
    background: rgba(58, 74, 46, 0.6);
    z-index: 55;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
  @media (min-width: 1024px) { .sidebar-overlay { display: none; } }

  .content { min-width: 0; background: var(--cream); }

  .mobile-header {
    position: sticky; top: 0; z-index: 40;
    background: var(--cream);
    border-bottom: 2px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
  }
  @media (min-width: 1024px) { .mobile-header { display: none; } }
  .hamburger {
    width: 40px; height: 40px;
    background: var(--ink); color: var(--cream);
    border: none;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 4px; cursor: pointer;
  }
  .hamburger span { width: 18px; height: 2px; background: var(--cream); }
  .mobile-chapter-indicator {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  /* ヒーロー */
  .hero {
    padding: 40px 24px 32px;
    border-bottom: 2px solid var(--ink);
    background: var(--cream);
    position: relative;
    overflow: hidden;
  }
  @media (min-width: 768px) { .hero { padding: 56px 48px 40px; } }
  @media (min-width: 1280px) { .hero { padding: 64px 64px 48px; } }

  .hero-tag {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .hero-tag::before {
    content: ''; width: 24px; height: 2px;
    background: var(--terracotta);
  }

  .hero-en {
    font-family: 'Anton', sans-serif;
    font-size: clamp(40px, 6.5vw, 80px);
    line-height: 0.95;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .hero-en-sub {
    font-family: 'Anton', sans-serif;
    font-size: clamp(40px, 6.5vw, 80px);
    line-height: 0.95;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    color: var(--terracotta);
    display: block;
  }
  .hero-jp {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 700;
    font-size: clamp(20px, 2.6vw, 28px);
    line-height: 1.5;
    letter-spacing: 0.02em;
    color: var(--ink);
    margin-top: 20px;
  }
  .hero-lead {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 1.85;
    color: var(--ink);
    opacity: 0.82;
    margin-top: 16px;
    max-width: 640px;
  }
  @media (min-width: 768px) { .hero-lead { font-size: 16px; } }

  .hero-num-bg {
    position: absolute;
    top: -10px; right: -10px;
    font-family: 'Anton', sans-serif;
    font-size: clamp(140px, 18vw, 220px);
    line-height: 0.8;
    color: var(--ink);
    opacity: 0.05;
    pointer-events: none;
    user-select: none;
  }

  /* マーキー */
  .marquee {
    overflow: hidden;
    white-space: nowrap;
    padding: 10px 0;
    background: var(--ink);
    color: var(--cream);
    border-bottom: 2px solid var(--ink);
  }
  .marquee-track {
    display: inline-flex;
    gap: 32px;
    animation: marquee 40s linear infinite;
    will-change: transform;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .marquee-item {
    font-family: 'Anton', sans-serif;
    font-size: 20px;
    line-height: 1;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 32px;
    opacity: 0.9;
  }
  .marquee-star {
    display: inline-block;
    width: 16px; height: 16px;
    color: var(--terracotta);
  }

  /* 本文 */
  .block {
    padding: 36px 24px;
    border-bottom: 1px solid var(--line-soft);
  }
  @media (min-width: 768px) { .block { padding: 48px; } }
  @media (min-width: 1280px) { .block { padding: 56px 64px; } }

  .block-label {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin-bottom: 10px;
  }
  .block-heading {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 700;
    font-size: 22px;
    line-height: 1.45;
    color: var(--ink);
    margin-bottom: 16px;
    letter-spacing: 0.01em;
  }
  @media (min-width: 768px) { .block-heading { font-size: 24px; } }
  .block-body {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 400;
    font-size: 16px;
    line-height: 1.95;
    letter-spacing: 0.02em;
    color: var(--ink);
    max-width: 720px;
  }
  @media (min-width: 768px) { .block-body { font-size: 17px; } }
  .block-body b, .block-body strong { font-weight: 700; }

  .key {
    background: var(--sage-light);
    padding: 2px 6px;
    color: var(--ink);
    font-weight: 700;
  }
  .key-rose { color: var(--terracotta); font-weight: 700; }

  /* ビフォー/アフター */
  .ba-wrapper { max-width: 760px; margin-top: 8px; }
  .ba-tabs { display: flex; border-bottom: 2px solid var(--ink); }
  .ba-tab {
    padding: 12px 24px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .ba-tab.active { background: var(--ink); color: var(--cream); }
  .ba-content {
    padding: 28px 28px 24px;
    background: var(--cream-deep);
    border: 1px solid var(--line);
    border-top: none;
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 500;
    font-size: 16px;
    line-height: 1.85;
    color: var(--ink);
  }
  @media (min-width: 768px) { .ba-content { font-size: 17px; } }

  /* 例示カード */
  .example-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin-top: 8px;
  }
  @media (min-width: 768px) {
    .example-grid { grid-template-columns: repeat(3, 1fr); gap: 0; }
  }
  .example-card {
    padding: 24px 22px;
    background: var(--cream-deep);
    border: 1px solid var(--line);
  }
  @media (min-width: 768px) {
    .example-card { border-right: none; }
    .example-card:last-child { border-right: 1px solid var(--line); }
  }
  .example-num {
    font-family: 'Anton', sans-serif;
    font-size: 36px;
    line-height: 1;
    color: var(--terracotta);
    margin-bottom: 8px;
  }
  .example-title {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--ink);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .example-body {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 400;
    font-size: 14px;
    line-height: 1.85;
    color: var(--ink);
    opacity: 0.85;
  }

  /* 3ファイル比較カード */
  .h-scroll {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 8px 0 24px;
    margin-top: 8px;
    scrollbar-width: thin;
  }
  .h-scroll::-webkit-scrollbar { height: 6px; }
  .h-scroll::-webkit-scrollbar-track { background: var(--line-soft); }
  .h-scroll::-webkit-scrollbar-thumb { background: var(--ink); }
  .h-scroll-item {
    flex: 0 0 86%;
    max-width: 360px;
    scroll-snap-align: start;
  }
  @media (min-width: 640px) { .h-scroll-item { flex: 0 0 340px; } }

  .concept-card {
    padding: 28px 24px;
    height: 100%;
    border: 2px solid var(--ink);
    position: relative;
    overflow: hidden;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .concept-card:hover { transform: translateY(-4px); }
  .concept-card .num-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .concept-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    opacity: 0.7;
  }
  .concept-en {
    font-family: 'Anton', sans-serif;
    font-size: 30px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .concept-jp {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 700;
    font-size: 13px;
    margin-top: 6px;
    opacity: 0.8;
  }
  .concept-divider {
    border-top: 1.5px solid currentColor;
    margin: 18px 0;
    opacity: 0.4;
  }
  .concept-oneline {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 700;
    font-size: 15px;
    line-height: 1.65;
  }
  .concept-detail {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 400;
    font-size: 13px;
    line-height: 1.85;
    margin-top: 12px;
    opacity: 0.85;
  }
  .concept-meta {
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    opacity: 0.75;
    line-height: 1.7;
  }

  /* ステップ */
  .step-list { margin-top: 8px; max-width: 760px; }
  .step-item {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 18px;
    align-items: center;
    padding: 18px 0;
    border-top: 1px solid var(--line);
  }
  .step-item:last-child { border-bottom: 1px solid var(--line); }
  .step-num {
    font-family: 'Anton', sans-serif;
    font-size: 40px;
    line-height: 1;
    color: var(--terracotta);
  }
  .step-text {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 500;
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
  }
  @media (min-width: 768px) {
    .step-item { grid-template-columns: 72px 1fr; padding: 22px 0; }
    .step-num { font-size: 48px; }
    .step-text { font-size: 16px; }
  }

  /* チェックポイント */
  .takeaway-list { margin-top: 8px; max-width: 760px; }
  .takeaway-item {
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 16px;
    align-items: start;
    padding: 14px 0;
    border-top: 1px solid var(--line);
  }
  .takeaway-item:last-child { border-bottom: 1px solid var(--line); }
  .takeaway-num {
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    line-height: 1.2;
    color: var(--terracotta);
    padding-top: 2px;
  }
  .takeaway-text {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 1.85;
    color: var(--ink);
  }
  @media (min-width: 768px) { .takeaway-text { font-size: 16px; } }

  /* プルクオート */
  .pullquote {
    margin: 8px 0;
    padding: 28px 28px 28px 36px;
    background: var(--ink);
    color: var(--cream);
    position: relative;
    max-width: 760px;
  }
  .pullquote-mark {
    position: absolute;
    top: 16px; left: 12px;
    font-family: 'Anton', sans-serif;
    font-size: 36px;
    color: var(--terracotta-soft);
    line-height: 1;
  }
  .pullquote-text {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 700;
    font-size: 18px;
    line-height: 1.65;
    letter-spacing: 0.01em;
  }
  @media (min-width: 768px) { .pullquote-text { font-size: 22px; } }

  /* コード */
  .code-block {
    background: var(--ink);
    color: var(--cream);
    padding: 22px 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.85;
    margin-top: 12px;
    max-width: 760px;
    border-left: 4px solid var(--terracotta);
    overflow-x: auto;
    white-space: pre;
  }
  .code-block .code-comment { color: var(--sage-light); }
  .code-block .code-heading { color: var(--terracotta-soft); font-weight: 700; }
  .code-block .code-key { color: var(--terracotta); font-weight: 700; }

  /* 比較表 */
  .compare-table {
    margin-top: 12px;
    max-width: 760px;
    overflow-x: auto;
  }
  .compare-table table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-size: 14px;
  }
  .compare-table th {
    background: var(--ink);
    color: var(--cream);
    padding: 14px 16px;
    text-align: left;
    font-family: 'Archivo Black', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--ink);
    white-space: nowrap;
  }
  .compare-table td {
    padding: 14px 16px;
    background: var(--cream-deep);
    border: 1px solid var(--line);
    vertical-align: top;
    line-height: 1.7;
  }
  .compare-table td:first-child {
    font-weight: 700;
    background: var(--cream);
    white-space: nowrap;
  }
  @media (min-width: 768px) {
    .compare-table table { font-size: 15px; }
  }

  /* クイズ */
  .quiz-wrapper {
    background: var(--ink);
    color: var(--cream);
    padding: 32px 24px;
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
  }
  @media (min-width: 768px) { .quiz-wrapper { padding: 40px 48px; } }
  @media (min-width: 1280px) { .quiz-wrapper { padding: 48px 64px; } }
  .quiz-label {
    display: inline-flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
  }
  .quiz-label-badge {
    background: var(--terracotta); color: var(--cream);
    padding: 4px 10px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .quiz-label-text {
    font-family: 'Archivo Black', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .quiz-question {
    font-family: 'Zen Kaku Gothic Antique', sans-serif;
    font-weight: 500;
    font-size: 17px;
    line-height: 1.7;
    color: var(--cream);
    margin-bottom: 20px;
    max-width: 720px;
  }

/* 状態管理 */
const STORAGE_KEY = 'memory-files-progress-v2';
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { currentSection: 0, completedSections: [] };
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
let state = loadState();

const chapterNav = document.getElementById('chapterNav');

function renderSidebar() {
  const total = CONFIG.sections.length;
  const completedCount = state.completedSections.length;
  const percent = Math.round((completedCount / total) * 100);

  document.getElementById('progressPercent').textContent = percent;
  document.getElementById('progressFill').style.width = `${percent}%`;
  document.getElementById('mobileCurrent').textContent = String(state.currentSection + 1).padStart(2, '0');
  document.getElementById('mobileTotal').textContent = String(total).padStart(2, '0');

  chapterNav.innerHTML = CONFIG.sections.map((section, i) => {
    const isActive = i === state.currentSection;
    const isCompleted = state.completedSections.includes(section.id);
    return `
      <li>
        <button class="chapter-item ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}" data-section="${i}">
          <div class="chapter-num-sm">${section.chapterNum}</div>
          <div class="chapter-meta">
            <div class="chapter-tag-en">${section.tagEn}</div>
            <div class="chapter-title-jp">${section.tagJp}</div>
          </div>
        </button>
      </li>
    `;
  }).join('');

  chapterNav.querySelectorAll('.chapter-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.section, 10);
      goToSection(idx);
      closeSidebar();
    });
  });
}

const chapterContent = document.getElementById('chapterContent');

function renderChapter() {
  const section = CONFIG.sections[state.currentSection];
  const total = CONFIG.sections.length;
  let html = '';

  html += `
    <section class="hero">
      <div class="hero-num-bg">${section.chapterNum}</div>
      <div class="relative" style="z-index: 1;">
        <div class="hero-tag reveal">
          <span>CHAPTER ${section.chapterNum}</span>
          <span style="opacity: 0.4;">/</span>
          <span>${section.tagEn}</span>
        </div>
        <h1 class="hero-en reveal">${section.heroEn}</h1>
        <h1 class="hero-en-sub reveal">${section.heroEnSub}</h1>
        <p class="hero-jp reveal">${section.heroJp}</p>
        <p class="hero-lead reveal">${section.lead}</p>
      </div>
    </section>
    <div class="marquee">
      <div class="marquee-track">
        ${renderMarqueeContent(CONFIG.marquees[section.id])}
      </div>
    </div>
  `;

  section.blocks.forEach((block, idx) => {
    html += renderBlock(block, idx);
  });

  if (section.quiz) {
    html += renderQuiz(section.quiz, section.id);
  }

  const isCompleted = state.completedSections.includes(section.id);
  const isLast = state.currentSection === total - 1;
  const isFirst = state.currentSection === 0;

  html += `
    <div class="chapter-footer">
      <button id="prevBtn" class="btn-prev" ${isFirst ? 'disabled' : ''}>← Prev</button>
      <button id="nextBtn" class="btn-next">
        ${isLast
          ? (isCompleted ? '<span>↻ Read Again</span>' : '<span>✓ Complete</span>')
          : (isCompleted ? '<span>↻ Next Chapter</span><span>→</span>' : '<span>Next Chapter</span><span>→</span>')}
      </button>
      <div class="footer-meta">
        ${isLast ? '// END OF MEMORY FILES GUIDE' : `// Chapter ${String(state.currentSection + 2).padStart(2, '0')} awaits`}
      </div>
    </div>
  `;

  chapterContent.innerHTML = html;

  setupObserver();
  attachQuizHandlers(section);
  attachBeforeAfterHandlers();
  attachFooterHandlers();
}

function renderMarqueeContent(text) {
  const item = `<div class="marquee-item">${text.replace(/★/g, '<svg class="marquee-star" viewBox="0 0 32 32" fill="currentColor"><path d="M16 0 L19 13 L32 16 L19 19 L16 32 L13 19 L0 16 L13 13 Z"/></svg>')}</div>`;
  return item.repeat(4);
}

function renderBlock(block, idx) {
  switch (block.type) {

    case "metaphor":
      return `
        <section class="block">
          <div class="block-label reveal">— ${CONFIG.metaphor.title}</div>
          <div class="reveal" style="font-family: 'Zen Kaku Gothic Antique', sans-serif; font-weight: 500; font-size: clamp(18px, 2.4vw, 24px); line-height: 1.7; color: var(--ink); max-width: 760px;">
            ${CONFIG.metaphor.body}
          </div>
        </section>
      `;

    case "text":
      return `
        <section class="block">
          ${block.labelEn ? `<div class="block-label reveal">— ${block.labelEn}</div>` : ''}
          ${block.heading ? `<h2 class="block-heading reveal">${block.heading}</h2>` : ''}
          <div class="block-body reveal">${block.body}</div>
        </section>
      `;

    case "codeBlock":
      return `
        <section class="block" style="padding-top: 0;">
          <pre class="code-block reveal">${block.code}</pre>
        </section>
      `;

    case "filesCarousel":
      return `
        <section class="block">
          <div class="block-label reveal">— THREE FILES</div>
          <h2 class="block-heading reveal">3つのメモリーファイル</h2>
          <div class="block-body reveal" style="margin-bottom: 12px;">
            ← 左右にスクロールしてご覧ください →
          </div>
          <div class="h-scroll reveal">
            ${CONFIG.files.map(d => `
              <div class="h-scroll-item">
                <div class="concept-card" style="background: ${d.bg}; color: ${d.fg};">
                  <div class="num-row">
                    <span class="concept-num">${d.number}</span>
                  </div>
                  <div class="concept-en">${d.labelEn}</div>
                  <div class="concept-jp">${d.labelJp}</div>
                  <div class="concept-divider"></div>
                  <div class="concept-oneline">${d.oneLine}</div>
                  <p class="concept-detail">${d.detail}</p>
                  <div class="concept-meta">
                    ▸ 読むAI: ${d.readers}<br>
                    ▸ 強み: ${d.strength}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `;

    case "compareTable":
      return `
        <section class="block">
          <div class="compare-table reveal">
            <table>
              <thead>
                <tr>
                  ${block.headers.map(h => `<th>${h}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${block.rows.map(row => `
                  <tr>
                    ${row.map(cell => `<td>${cell}</td>`).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </section>
      `;

    case "beforeafter":
      return `
        <section class="block">
          ${block.labelEn ? `<div class="block-label reveal">— ${block.labelEn}</div>` : ''}
          <h2 class="block-heading reveal">${block.heading}</h2>
          <div class="ba-wrapper reveal">
            <div class="ba-tabs">

              <button class="ba-tab" data-target="ba-${idx}" data-mode="after">${block.after.label}</button>
            </div>
            <div id="ba-${idx}" class="ba-content">
              <div data-content="before">${block.before.text}</div>
              <div data-content="after" class="hidden">${block.after.text}</div>
            </div>
          </div>
        </section>
      `;

    case "pullquote":
      return `
        <section class="block">
          <div class="pullquote reveal">
            <div class="pullquote-mark">"</div>
            <div class="pullquote-text">${block.text}</div>
          </div>
        </section>
      `;

    case "exampleCards":
      return `
        <section class="block">
          ${block.labelEn ? `<div class="block-label reveal">— ${block.labelEn}</div>` : ''}
          ${block.heading ? `<h2 class="block-heading reveal">${block.heading}</h2>` : ''}

    case "steps":

          </ol>
        </section>

    case "checkpoint":
      return `
        <section class="block">
          <div class="block-label reveal">— TAKEAWAYS</div>
          <h2 class="block-heading reveal">ここまでで分かったこと</h2>
          <ul class="takeaway-list reveal">
            ${block.items.map((item, i) => `
              <li class="takeaway-item">
                <div class="takeaway-num">${String(i + 1).padStart(2, '0')}</div>
                <div class="takeaway-text">${item}</div>

    case "finale":
      return `
        <section class="finale">
          <div class="reveal">
            <div class="finale-fin">FIN.</div>
          </div>

            店舗のフォルダに AGENTS.md を1つ置く。<br>
            明日からあなたが使うすべてのAIが、店舗の常識を持った仲間になります。
          </div>
        </section>
      `;

    default:
      return '';
  }
}

function renderQuiz(quiz, sectionId) {
  return `
    <section class="quiz-wrapper">
      <div class="quiz-label">
        <span class="quiz-label-badge">CHECK</span>
        <span class="quiz-label-text">Quick Quiz</span>
      </div>
      <div class="quiz-question">${quiz.question}</div>
      <div class="quiz-options" id="quiz-${sectionId}">
        ${quiz.options.map((opt, i) => `
          <button class="quiz-option" data-correct="${opt.correct}" data-index="${i}">
            <span class="opt-letter">${String.fromCharCode(65 + i)}</span>
            <span>${opt.text}</span>
          </button>
        `).join('')}
      </div>
      <div id="quiz-feedback-${sectionId}" class="quiz-feedback hidden"></div>
    </section>
  `;
}

function attachQuizHandlers(section) {
  if (!section.quiz) return;
  const container = document.getElementById(`quiz-${section.id}`);
  if (!container) return;

  const options = container.querySelectorAll('.quiz-option');
  const feedback = document.getElementById(`quiz-feedback-${section.id}`);

  options.forEach(btn => {
    btn.addEventListener('click', () => {
      const isCorrect = btn.dataset.correct === 'true';
      const idx = parseInt(btn.dataset.index, 10);
      options.forEach(b => b.classList.add('locked'));
      btn.classList.add(isCorrect ? 'quiz-correct' : 'quiz-wrong');
      options.forEach(b => {
        if (b.dataset.correct === 'true' && !b.classList.contains('quiz-correct')) {
          b.classList.add('quiz-correct');
        }
      });
      const reason = section.quiz.options[idx].reason;
      feedback.innerHTML = `
        <div class="quiz-feedback-label">${isCorrect ? '✓ CORRECT.' : '✗ NOT QUITE.'}</div>
        <div class="quiz-feedback-body">${reason}</div>
      `;
      feedback.classList.remove('hidden');
    });
  });
}

function attachBeforeAfterHandlers() {
  document.querySelectorAll('.ba-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const targetId = btn.dataset.target;
      const mode = btn.dataset.mode;
      const target = document.getElementById(targetId);
      const group = btn.parentElement.querySelectorAll('.ba-tab');
      group.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      target.querySelectorAll('[data-content]').forEach(c => {
        c.classList.toggle('hidden', c.dataset.content !== mode);
      });
    });
  });
}

function attachFooterHandlers() {
  const total = CONFIG.sections.length;
  const isFirst = state.currentSection === 0;
  const isLast = state.currentSection === total - 1;
  const isCompleted = state.completedSections.includes(CONFIG.sections[state.currentSection].id);

  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  if (prevBtn && !isFirst) {
    prevBtn.addEventListener('click', () => {
      goToSection(state.currentSection - 1);
    });
  }

  if (nextBtn) {
    nextBtn.addEventListener('click', () => {
      const sId = CONFIG.sections[state.currentSection].id;
      if (!state.completedSections.includes(sId)) {
        state.completedSections.push(sId);
      }
      if (!isLast) {
        goToSection(state.currentSection + 1);
      } else if (isCompleted) {
        goToSection(0);
      } else {
        saveState();
        renderSidebar();
        renderChapter();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  }
}

function goToSection(idx) {
  state.currentSection = idx;
  saveState();
  renderSidebar();
  renderChapter();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

let observer;
function setupObserver() {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const hamburger = document.getElementById('hamburger');

function openSidebar() {
  sidebar.classList.add('open');
  sidebarOverlay.classList.add('open');
}
function closeSidebar() {
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('open');
}
hamburger.addEventListener('click', openSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('進捗をリセットして最初から始めますか？')) {
    state = { currentSection: 0, completedSections: [] };
    saveState();
    renderSidebar();
    renderChapter();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});

renderSidebar();
renderChapter();
</script>
